[package]
name = "maw-assurance"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Formal-verification primitives for maw — oracle, model, and Stateright integration"
keywords = ["verification", "stateright", "model-checking", "maw"]
categories = ["development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
stateright = { version = "0.30", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
kani-slow = []
stateright = ["dep:stateright"]

[lints]
workspace = true
