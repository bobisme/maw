name: SG1 Faithful-Binary Build + Clippy

# Faithful-tier build + clippy gate (bn-1gp4, T1.7).
#
# Per `notes/sg1-dst-architecture.md` §7: "Faithful tier needs a
# dedicated build with `--features failpoints` ... a separate CI
# job/build; the default release build stays clean and zero-overhead
# (`fp!()` compiles to nothing without the feature)."
#
# Per the bn-2ors fix on main, BOTH lints must stay -D warnings clean:
#   - default build:   `cargo clippy --workspace --all-targets -- -D warnings`
#   - failpoints build: `cargo clippy -p maw-cli --features failpoints --all-targets -- -D warnings`
#
# This workflow runs the second one (the first is already covered by the
# main CI / `just clippy` gate). It also builds the failpoints release
# binary so a green run guarantees the faithful tier is deployable.
#
# bn-1nmh: also runs the `--features bench` clippy pass (the SG2
# benchmark-harness crates: maw-bench, maw-bench-sweep, maw-bench-metrics,
# maw-bench-adapters). That feature build previously had NO CI coverage —
# the default `cargo build`/`clippy` never turns `bench` on — so a
# non-exhaustive match on `Op` after `Op::Advance` was added rotted
# unnoticed for a whole release cycle. This job already runs on every PR +
# push to main, so the bench-feature clippy pass rides along here rather
# than standing up a new workflow.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR (see dst.yml) so back-to-back
# pushes don't stack failpoints clippy + release builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  failpoints-clippy:
    name: Faithful-binary clippy (--features failpoints)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@just
      - uses: Swatinem/rust-cache@v2

      # Runs BOTH clippy invocations per bn-2ors (default + failpoints).
      - name: Clippy (default + failpoints)
        run: just sg1-faithful-clippy

      # bn-1nmh: SG2 benchmark-harness feature build (kept cheap — clippy
      # only, not the (heavier, real-LLM-capable) bench test suite).
      - name: Clippy (--features bench)
        run: just sg2-bench-clippy

      # Build the failpoints release binary so the faithful tier is
      # deployable (the nightly soak's faithful-binary step expects this
      # binary to compile cleanly).
      - name: Build failpoints release binary
        run: just sg1-faithful-build
