name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build maw binary for integration harnesses
        run: cargo build -p maw-cli --bin maw

      - name: Run tests
        run: cargo test

      - name: Publish crates to crates.io
        run: |
          # Derive the version from the pushed tag (strip leading 'v').
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing workspace crates at version $VERSION"

          wait_for_crate() {
            crate="$1"
            version="$2"
            for _ in $(seq 1 30); do
              if python -c 'import json, sys, urllib.request; crate, version = sys.argv[1:3]; data = json.load(urllib.request.urlopen(f"https://crates.io/api/v1/crates/{crate}", timeout=10)); raise SystemExit(0 if version in {item["num"] for item in data.get("versions", [])} else 1)' "$crate" "$version"
              then
                return 0
              fi
              sleep 10
            done
            echo "Timed out waiting for $crate $version on crates.io" >&2
            return 1
          }

          # Dependency order:
          #   maw-lfs     (no workspace deps)
          #   maw-git     (depends on maw-lfs)
          #   maw-core    (depends on maw-git)
          #   maw-assurance (no workspace deps; optional dep of root)
          #   maw-workspaces (root; depends on all of the above)
          # maw-cli has publish = false (binary crate, installed via source).
          # maw-tui is not currently published.
          cargo publish -p maw-lfs
          wait_for_crate maw-lfs "$VERSION"
          cargo publish -p maw-git
          wait_for_crate maw-git "$VERSION"
          cargo publish -p maw-core
          wait_for_crate maw-core "$VERSION"
          cargo publish -p maw-assurance
          wait_for_crate maw-assurance "$VERSION"
          cargo publish -p maw-workspaces
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
