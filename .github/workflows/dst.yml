name: Deterministic Simulation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dst:
    runs-on: ubuntu-latest
    env:
      DST_ARTIFACT_DIR: ${{ runner.temp }}/maw-dst-artifacts
      WORKFLOW_DST_TRACES: "12"
      ACTION_DST_TRACES: "12"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build maw binary for integration harnesses
        run: cargo build -p maw-cli

      - name: Run workflow-level DST sweep
        run: ./target/debug/maw dev sim run --harness workflow --seeds $WORKFLOW_DST_TRACES --print-only && ./target/debug/maw dev sim run --harness workflow --seeds $WORKFLOW_DST_TRACES

      - name: Run action-level DST sweep
        run: ./target/debug/maw dev sim run --harness action --seeds $ACTION_DST_TRACES --steps 14 --print-only && ./target/debug/maw dev sim run --harness action --seeds $ACTION_DST_TRACES --steps 14

      - name: Upload DST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maw-dst-artifacts
          path: ${{ env.DST_ARTIFACT_DIR }}
          if-no-files-found: warn

      - name: Publish DST replay summary
        if: always()
        run: |
          {
            echo "## Deterministic Simulation"
            echo
            echo "- Artifact: \\`maw-dst-artifacts\\`"
            echo "- Run sweeps: \\`maw dev sim run --harness all --seeds 12 --steps 14 --print-only\\`"
            echo "- Workflow replay: \\`maw dev sim replay --harness workflow --seed <seed> --print-only\\`"
            echo "- Action replay: \\`maw dev sim replay --harness action --seed <seed> --steps <prefix> --print-only\\`"
            echo "- Action shrink: \\`maw dev sim shrink --bundle /tmp/maw-dst-artifacts/action-workflow-dst/seed-.../bundle.json --print-only\\`"
            echo "- Bundle replay: \\`maw dev sim replay --bundle /tmp/maw-dst-artifacts/<harness>/seed-.../bundle.json\\`"
            echo "- Bones protocol replay remains: \\`bn dev sim replay --seed <seed>\\`"
          } >> "$GITHUB_STEP_SUMMARY"
