name: Deterministic Simulation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  dst:
    runs-on: ubuntu-latest
    env:
      DST_ARTIFACT_DIR: /tmp/maw-dst-artifacts
      WORKFLOW_DST_TRACES: "12"
      ACTION_DST_TRACES: "12"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@just

      - uses: Swatinem/rust-cache@v2

      - name: Build maw binary for integration harnesses
        run: cargo build -p maw-cli

      - name: Run workflow-level DST sweep
        run: just sim-run-print workflow $WORKFLOW_DST_TRACES 14 && just sim-run workflow $WORKFLOW_DST_TRACES 14

      - name: Run action-level DST sweep
        run: just sim-run-print action $ACTION_DST_TRACES 14 && just sim-run action $ACTION_DST_TRACES 14

      - name: Upload DST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maw-dst-artifacts
          path: ${{ env.DST_ARTIFACT_DIR }}
          if-no-files-found: warn

      - name: Publish DST replay summary
        if: always()
        run: |
          {
            echo "## Deterministic Simulation"
            echo
            echo "- Artifact: \\`maw-dst-artifacts\\`"
            echo "- Run sweeps: \\`just sim-run-print all 12 14\\`"
            echo "- Workflow replay: \\`just sim-replay-workflow <seed>\\`"
            echo "- Action replay: \\`just sim-replay-action <seed> <prefix>\\`"
            echo "- Action shrink: \\`just sim-shrink-bundle /tmp/maw-dst-artifacts/action-workflow-dst/seed-.../bundle.json\\`"
            echo "- Bundle inspect: \\`just sim-inspect /tmp/maw-dst-artifacts/<harness>/seed-.../bundle.json\\`"
            echo "- Bones protocol replay remains: \\`bn dev sim replay --seed <seed>\\`"
          } >> "$GITHUB_STEP_SUMMARY"
